apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fintech-root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/venkatkube/fintech-platform
    targetRevision: HEAD
    path: argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true