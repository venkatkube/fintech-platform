apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fintech-services-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/venkatkube/fintech-platform
    targetRevision: HEAD
    path: k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: fintech-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true