apiVersion: apps/v1
kind: Deployment
metadata:
  name: txn-service
  labels:
    app: txn-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: txn-service
  template:
    metadata:
      labels:
        app: txn-service
        tier: backend
    spec:
      containers:
      - name: txn-service
        image: YOUR_DOCKER_USER/txn-service:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        env:
        - name: MONGO_URI
          value: mongodb://mongodb:27017/txn
        - name: RABBITMQ_URL
          value: amqp://rabbitmq

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false

      restartPolicy: Always